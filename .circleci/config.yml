version: 2.1
jobs:
  build:
    working_directory: ~/eportal
    docker:
      - image: circleci/python:3.8
        environment:
          DATABASE_URL: postgresql://root@localhost/circle_test?sslmode=disable
      - image: circleci/postgres:12
        environment:
          POSTGRES_USER: root
          POSTGRES_DB: circle_test
    steps:
      - checkout
      - python/load-cache
      - python/install-deps
      - python/save-cache
      - run: sudo chown -R circleci:circleci /usr/local/bin
      - run: sudo chown -R circleci:circleci /usr/local/lib/python3.6/site-packages
      - run:
          command: ./manage.py test --settings=eportal.settings.circleci_settings
          name: Test
workflows:
  main:
    jobs:
      - build-and-test
